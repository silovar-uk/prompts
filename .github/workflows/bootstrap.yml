name: Expand Phase 0 source

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  expand:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand source archive
        shell: bash
        run: |
          cat .bootstrap/chunk-* > /tmp/source.tar.gz.b64
          base64 --decode /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz -C .
          rm -rf .bootstrap .github/workflows/bootstrap.yml
      - name: Commit expanded source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement Phase 0 prompt launcher"
          git push
