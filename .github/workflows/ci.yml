name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Legacy - home search
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "ホームで検索結果" --reporter=basic

      - name: Legacy - image home
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "画像生成だけ" --reporter=basic

      - name: Legacy - image library
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "画像生成へ絞り込める" --reporter=basic

      - name: Legacy - add favorite
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "お気に入りへ追加できる" --reporter=basic

      - name: Legacy - favorite filter
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "お気に入りだけを表示" --reporter=basic

      - name: Legacy - library search
        run: npx vitest run src/LibraryFirstApp.test.tsx -t "ライブラリ検索" --reporter=basic
