name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Unit - library navigation
        run: npx vitest run src/ReferenceLibraryApp.test.tsx -t "ライブラリから" --reporter=basic

      - name: Unit - image category
        run: npx vitest run src/ReferenceLibraryApp.test.tsx -t "画像生成カテゴリ" --reporter=basic

      - name: Unit - personal shelf
        run: npx vitest run src/ReferenceLibraryApp.test.tsx -t "マイ棚へ固定" --reporter=basic

      - name: Unit - full suite
        run: npm run test -- --reporter=basic

      - name: Validate prompt data
        run: npm run validate:data

      - name: Search regression
        run: npm run test:search

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Mobile smoke tests
        run: npm run test:e2e
