name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Unit - new launcher
        run: npx vitest run src/ReferenceLibraryApp.test.tsx --reporter=basic

      - name: Unit - root app files
        shell: bash
        run: |
          mapfile -t files < <(find src -maxdepth 1 -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) ! -name 'ReferenceLibraryApp.test.tsx')
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - components
        shell: bash
        run: |
          mapfile -t files < <(find src/components -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) 2>/dev/null)
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - local
        shell: bash
        run: |
          mapfile -t files < <(find src/local -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) 2>/dev/null)
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - search
        shell: bash
        run: |
          mapfile -t files < <(find src/search -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) 2>/dev/null)
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - store
        shell: bash
        run: |
          mapfile -t files < <(find src/store -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) 2>/dev/null)
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - scripts
        shell: bash
        run: |
          mapfile -t files < <(find scripts -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) 2>/dev/null)
          if ((${#files[@]})); then npx vitest run "${files[@]}" --reporter=basic; fi

      - name: Unit - full suite
        run: npm run test -- --reporter=basic

      - name: Validate prompt data
        run: npm run validate:data

      - name: Search regression
        run: npm run test:search

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Mobile smoke tests
        run: npm run test:e2e
