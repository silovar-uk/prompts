name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Mobile - navigation
        run: npx playwright test e2e/mobile.spec.ts -g "ホーム・ライブラリ・マイ棚"

      - name: Mobile - use flow
        run: npx playwright test e2e/mobile.spec.ts -g "使用パネル"

      - name: Mobile - shelf
        run: npx playwright test e2e/mobile.spec.ts -g "マイ棚へ固定"
